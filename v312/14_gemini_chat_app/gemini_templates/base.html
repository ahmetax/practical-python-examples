<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ollama Chat{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; color: #4ade80; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.82rem;
    }

    select {
      padding: 0.35rem 0.7rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.82rem;
      outline: none;
      font-family: inherit;
    }

    select:focus { border-color: #a78bfa; }

    .btn {
      padding: 0.35rem 0.9rem;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #7c3aed; color: white; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-danger    { background: #dc2626; color: white; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
