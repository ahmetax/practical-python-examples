<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Expense Tracker{% endblock %}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #0f766e;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 1.4rem; }

    nav {
      display: flex;
      gap: 0.5rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    nav a:hover,
    nav a.active { background: rgba(255,255,255,0.2); }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 0.6rem 0.9rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, select:focus { border-color: #0f766e; }

    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: #0f766e; color: white; }
    .btn-danger    { background: #ef4444; color: white; }
    .btn-secondary { background: #6b7280; color: white; }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .flash-success { background: #d1fae5; color: #065f46; }
    .flash-error   { background: #fee2e2; color: #991b1b; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 0.8rem;
      background: #f9fafb;
      color: #6b7280;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    td {
      padding: 0.7rem 0.8rem;
      border-bottom: 1px solid #f3f4f6;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <h1>💰 Expense Tracker</h1>
    <nav>
      <a href="/"        class="{{ 'active' if request.path == '/' }}">Dashboard</a>
      <a href="/add"     class="{{ 'active' if request.path == '/add' }}">+ Add</a>
      <a href="/report"  class="{{ 'active' if request.path == '/report' }}">Report</a>
    </nav>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
