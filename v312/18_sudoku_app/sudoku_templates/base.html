<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sudoku{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; color: #34d399; }
    header span { font-size: 0.82rem; color: #475569; }
    main {
      max-width: 1060px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #64748b;
      margin-bottom: 1.2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary   { background: #059669; color: white; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-purple    { background: #7c3aed; color: white; }
    .btn-orange    { background: #ea580c; color: white; }
    .btn-blue      { background: #0284c7; color: white; }
    select, input[type="number"], input[type="text"] {
      padding: 0.5rem 0.8rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
    }
    select:focus, input:focus { border-color: #34d399; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <h1>🧩 Sudoku Creator / Solver</h1>
    <span>Python + Flask</span>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
