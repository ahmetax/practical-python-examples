{% extends "base.html" %}

{% block title %}Edit Task{% endblock %}

{% block content %}
<div class="card">
  <h2>Edit Task</h2>
  <form method="POST" action="/edit/{{ task.id }}">
    <div style="display:flex; flex-direction:column; gap:1rem;">
      <div>
        <label style="font-size:0.85rem; color:#6b7280; display:block; margin-bottom:0.3rem;">
          Task Title
        </label>
        <input type="text" name="title" value="{{ task.title }}" required>
      </div>
      <div>
        <label style="font-size:0.85rem; color:#6b7280; display:block; margin-bottom:0.3rem;">
          Priority
        </label>
        <select name="priority" style="width:auto;">
          <option value="high"   {{ 'selected' if task.priority == 'high'   }}>High</option>
          <option value="medium" {{ 'selected' if task.priority == 'medium' }}>Medium</option>
          <option value="low"    {{ 'selected' if task.priority == 'low'    }}>Low</option>
        </select>
      </div>
      <div style="display:flex; gap:0.5rem;">
        <button type="submit" class="btn btn-primary">💾 Save</button>
        <a href="/" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
